services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeswap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeswap"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS Backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tradeswap
      FRONTEND_URL: http://localhost
      PORT: 3000
      # AWS S3 — copy .env.example to .env and fill in your values
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
      AWS_BUCKET_REGION: ${AWS_BUCKET_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls the backend directly — must be reachable from the user's machine
        VITE_API_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
