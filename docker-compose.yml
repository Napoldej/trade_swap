services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeswap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeswap"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS Backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # These override backend/.env so Docker networking works correctly
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tradeswap
      FRONTEND_URL: http://localhost:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # ── Prisma Studio ────────────────────────────────────────────────────────────
  prisma-studio:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tradeswap
    command: sh -c "cd /app/src/infrastructure && npx prisma studio --port 5555 --browser none"
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls the backend directly — must be reachable from the user's machine
        VITE_API_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
